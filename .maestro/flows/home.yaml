# .maestro/flows/home.yaml
#
# Verifies the default Expo Router home tab loads and renders its scaffold
# content. Used by feature `e2e-001` as the smoke flow that proves the
# Maestro toolchain itself is wired up.
#
# Once feature `ui-001` is implemented (home tab shows project name and
# harness status), this flow should be extended — or replaced with
# ui-001.yaml — to assert on the harness-specific UI.
#
# Override the appId by exporting APP_ID before invoking
# scripts/run-maestro.sh; the wrapper defaults it to host.exp.exponent
# (Expo Go) when unset. Maestro's substitution uses a JS engine and does
# not understand bash-style ${VAR:-default} fallbacks, so the default
# lives in the wrapper, not here.

appId: ${APP_ID}
---
- launchApp:
    clearState: false
    stopApp: true

# Wait for the JS bundle to finish loading. The Welcome! string is the
# top-level title on the default Expo scaffold home tab.
- assertVisible: "Welcome!"

# Scaffold step labels — proves the bundle executed, ParallaxScrollView
# rendered, and the typography components mounted. Step 1 fits in the
# initial viewport on iPhone 16 Pro; Steps 2 and 3 require scrolling.
# `scrollUntilVisible` doubles as proof that ParallaxScrollView is
# interactive, not just statically rendered.
- assertVisible: "Step 1: Try it"
- scrollUntilVisible:
    element:
      text: "Step 2: Explore"
- scrollUntilVisible:
    element:
      text: "Step 3: Get a fresh start"

# Tab bar — proves the bottom Tabs navigator mounted.
- assertVisible:
    text: "Home"
- assertVisible:
    text: "Explore"

# Tap the Explore tab and assert we navigated. This exercises router
# state, not just the static home render.
- tapOn: "Explore"
- assertVisible: "Explore"

# Drop a screenshot for the agent / human to inspect. The wrapper script
# copies this into tmp/diagnostics/ with a timestamped name.
- takeScreenshot: home
