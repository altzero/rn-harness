# .maestro/flows/home.yaml
#
# Smoke flow for feature `e2e-001`. The minimum that proves the
# toolchain is wired up end-to-end:
#   - the Release-built .app installs and launches
#   - the JS bundle executes
#   - the home tab renders
# Anything more (tab bar, navigation) becomes part of `ui-001.yaml`
# once that feature lands with real harness-specific content.
#
# What was dropped and why:
#   - "Step 1/2/3" — wrapped in <Link.Trigger> which doesn't surface
#     a queryable text node in Maestro's accessibility view.
#   - tab bar labels "Home" / "Explore" — iOS 26's tab bar layout
#     (and/or the project's HapticTab wrapper) prevent Maestro from
#     finding the label text reliably.
#
# Override appId via APP_ID env var; scripts/run-maestro.sh defaults
# it to host.exp.exponent and passes it through with `maestro test -e`.

appId: ${APP_ID}
---
- launchApp:
    clearState: false
    stopApp: true

- assertVisible: "Welcome!"

- takeScreenshot: home
